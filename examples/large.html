<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chai-Tailwind Large DOM Test</title>
    <script defer src="../dist/chai-tailwind.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var app = document.getElementById("app");
        var html = "";
        var index = 0;
        var start;
        var end;

        for (index = 0; index < 600; index += 1) {
          html += '<div style="background-color: #ffffff; border-width: 1px; border-style: solid; border-color: #e5e7eb; border-radius: 14px; padding: 16px; margin-bottom: 12px">';
          html += '<strong style="color: #0f172a; font-weight: 700">Item ' + (index + 1) + "</strong>";
          html += '<p style="color: #6b7280; font-size: 14px; margin-top: 8px">Large DOM traversal test.</p>';
          html += "</div>";
        }

        app.innerHTML = html;
        start = performance.now();
        window.ChaiTailwind.scan(app);
        end = performance.now();
        console.log("Large DOM scan time:", (end - start).toFixed(2) + "ms");
      });
    </script>
  </body>
</html>
